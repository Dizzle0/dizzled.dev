<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="img/pfp.png">
    <title>dizzled.dev</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://www.nerdfonts.com/assets/css/webfont.css">
</head>
<body>
    <div class="scanline"></div>
    
    <div class="container">
        <div class="profile-section">
            <div class="profile-ring">
                <div class="profile-img">
                    <img src="img/pfp.png" alt="Dizzle">
                </div>
            </div>
            
            <h1 class="glitch">Dizzle</h1>
            <p class="subtitle"><span class="lambda-icon">λ</span> Student | Hacker | IT Enthusiast <span class="lambda-icon">λ</span></p>
            

        </div>
        
        <div class="status-bar">
            <span class="status-item"><i class="fa-solid fa-location-dot"></i> New Zealand</span>
            <span class="status-item"><i class="fa-solid fa-clock"></i> <span id="time"></span></span>
        </div>
        
        <div class="tech-section">
            <span class="tech-label">Languages</span>
            <div class="tech-stack">
                <i class="fa-brands fa-python" title="Python"></i>
                <i class="nf nf-dev-html5" title="HTML"></i>
                <i class="nf nf-dev-css3" title="CSS"></i>
                <i class="fa-brands fa-js" title="JavaScript"></i>
                <i class="fa-brands fa-java" title="Java"></i>
                <i class="nf nf-dev-c" title="C"></i>
                <i class="nf nf-dev-csharp" title="C#"></i>
                <i class="nf nf-dev-bash" title="Bash"></i>
            </div>
        </div>
        
        <div class="tech-section">
            <span class="tech-label">Tools</span>
            <div class="tech-stack">
                <i class="nf nf-dev-visualstudio" title="VS Code"></i>
                <i class="nf nf-dev-neovim" title="NeoVim"></i>
                <i class="nf nf-dev-docker" title="Docker"></i>
                <i class="fa-brands fa-github" title="GitHub"></i>
                <i class="nf nf-cod-copilot" title="Copilot"></i>
            </div>
        </div>
        
        <div class="tech-section">
            <span class="tech-label">OS / Platforms</span>
            <div class="tech-stack">
                <i class="fa-brands fa-apple" title="macOS"></i>
                <i class="nf nf-md-arch" title="Arch Linux"></i>
                <i class="fa-brands fa-debian" title="Debian"></i>
                <i class="nf nf-linux-fedora" title="Fedora"></i>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
